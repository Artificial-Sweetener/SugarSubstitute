repos:
  - repo: local
    hooks:
      - id: license-headers
        name: Maintain GPL license headers
        entry: python tools/license_headers.py --write
        language: system
        pass_filenames: false
        always_run: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 2c9f875913ee60ca25ce70243dc24d5b6415598c # v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
        # Avoid flipping EOLs for Windows shell scripts which should remain CRLF
        exclude: >-
          (\.bat$|\.cmd$|\.ps1$)
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
        exclude: >-
          ^(log/|tmp_comfycli\.json|.*/tsconfig\.json$)
      - id: check-toml

