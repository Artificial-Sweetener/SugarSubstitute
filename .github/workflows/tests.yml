name: Tests

on:
  push:
    branches-ignore:
      - main
  pull_request:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  QT_QPA_PLATFORM: offscreen
  QT_OPENGL: software
  SUBSTITUTE_DISABLE_APP_USER_MODEL_ID: "1"
  SUBSTITUTE_DISABLE_QPANE_SAM_WARMUP: "1"
  LINUX_QT_PACKAGES: >-
    xvfb libegl1 libfontconfig1 libgl1 libxcb-cursor0 libxcb-icccm4
    libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-shape0
    libxcb-util1 libxcb-xkb1 libxkbcommon-x11-0 libxkbcommon0

jobs:
  quality:
    name: Quality gates
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Create virtual environment
        run: python -m venv .venv
      - name: Install project and quality dependencies
        shell: pwsh
        run: |
          $PSNativeCommandUseErrorActionPreference = $true
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt
          .\.venv\Scripts\python.exe -m pip install pytest pytest-xdist ruff mypy
      - name: Check license headers
        run: .\.venv\Scripts\python.exe tools\license_headers.py --check
      - name: Check formatting
        run: .\.venv\Scripts\ruff.exe format --check .
      - name: Lint
        run: .\.venv\Scripts\ruff.exe check .
      - name: Type check
        run: .\.venv\Scripts\mypy.exe --strict substitute tests

  platform-tests:
    name: Tests (${{ matrix.name }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            python: ./.venv/Scripts/python.exe
            artifact: windows
          - name: Linux x64
            os: ubuntu-24.04
            python: ./.venv/bin/python
            artifact: linux
          - name: macOS Apple Silicon
            os: macos-15
            python: ./.venv/bin/python
            artifact: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Linux Qt runtime dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y $LINUX_QT_PACKAGES
      - name: Create virtual environment
        run: python -m venv .venv
      - name: Install project and test dependencies
        run: |
          ${{ matrix.python }} -m pip install --upgrade pip
          ${{ matrix.python }} -m pip install -r requirements.txt
          ${{ matrix.python }} -m pip install pytest pytest-xdist
      - name: Prepare test result directory
        run: >-
          ${{ matrix.python }} -c
          "from pathlib import Path; Path('build/test-results').mkdir(parents=True, exist_ok=True)"
      - name: Run parallel-safe test partition
        run: >-
          ${{ matrix.python }} -m pytest -n auto -q -m "not serial"
          --junitxml=build/test-results/${{ matrix.artifact }}-parallel.xml
      - name: Run serial test partition
        if: ${{ !cancelled() }}
        run: >-
          ${{ matrix.python }} -m tools.ci.run_serial_test_modules
          --junit-dir=build/test-results/${{ matrix.artifact }}-serial
      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: test-results-${{ matrix.artifact }}
          path: build/test-results
          if-no-files-found: warn
          retention-days: 7
